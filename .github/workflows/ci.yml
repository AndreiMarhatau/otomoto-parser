name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
      - name: Install Python dependencies
        run: uv sync --extra dev
      - name: Python lint
        run: uv run ruff check src tests tools
      - name: Maintainability checks
        run: uv run python tools/check_maintainability.py
      - name: Python compile check
        run: uv run python -m compileall src
      - name: Python tests with coverage
        run: uv run pytest
      - name: Backend per-file coverage
        run: uv run python tools/check_source_coverage.py --scope backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/otomoto_parser/v2/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/otomoto_parser/v2/frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Frontend lint
        run: npm run lint
      - name: Frontend tests with coverage
        run: npm test
      - name: Frontend per-file coverage
        run: python3 ../../../../tools/check_source_coverage.py --scope frontend
      - name: Frontend build
        run: npm run build
